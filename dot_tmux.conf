#==============================================================================
# ⚡  Prefix key configuration
#==============================================================================

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

#==============================================================================
# ⚡  Shell configuration
#==============================================================================

set -g default-shell "${SHELL}"
set -g default-command "${SHELL}"

# Expose mise shims + user bins to plugins (run-shell gets a minimal PATH)
set-environment -g PATH "/home/antoine/.local/share/mise/shims:/home/antoine/go/bin:/home/antoine/.cargo/bin:/home/antoine/.local/bin:/home/antoine/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

#==============================================================================
# ⚡  Mouse and terminal
#==============================================================================

set -g mouse on

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set-window-option -g monitor-activity off
set-option -g      visual-activity   off
set-option -g      visual-silence    off
set-option -g      visual-bell       off
set-option -g      bell-action       none

#==============================================================================
# ⚡  Keyboard behavior
#==============================================================================

set -sg escape-time 0

#==============================================================================
# ⚡  Clipboard / Copy / Paste
#==============================================================================

setw -g mode-keys vi

unbind [
bind v copy-mode

bind-key -T copy-mode-vi v       send-keys -X begin-selection
bind-key -T copy-mode-vi C-v     send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y       send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
bind-key -T copy-mode-vi Escape  send -X cancel
bind-key -T copy-mode-vi H       send -X start-of-line
bind-key -T copy-mode-vi L       send -X end-of-line
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -selection clipboard"

#==============================================================================
# ⚡  Window and pane options
#==============================================================================

set-option -g allow-rename off
set -g base-index        1
set -g pane-base-index   1
set -g renumber-windows  on
set -g detach-on-destroy off
set -g focus-events      on

#==============================================================================
# ⚡  Clean up conflicting defaults
#==============================================================================

unbind c        # new-window        → w,n (preserves path)
unbind n        # next-window       → M-l
unbind p        # previous-window   → M-h (p = pane table)
unbind s        # choose-tree       → s,s (s = session table)
unbind w        # choose-tree       → w,s (w = window table)
unbind f        # find-window       → w,f (f = floax)
unbind %        # split-h           → p,| or direct |
unbind '"'      # split-v           → p,- or direct -
unbind &        # kill-window       → w,x
unbind ','      # rename-window     → w,r
unbind '$'      # rename-session    → s,r
unbind ';'      # last-pane         → p,a

#==============================================================================
# ⚡  Root bindings (no prefix — instant access)
#==============================================================================
#
#   Horizontal = windows    M-h ←  M-l →
#   Vertical   = sessions   M-k ↑  M-j ↓
#   Pane nav   = C-hjkl     (via vim-tmux-navigator)
#

# Window cycling
bind -n M-h previous-window
bind -n M-l next-window

# Session cycling
bind -n M-j switch-client -n
bind -n M-k switch-client -p

# Pane resize
bind -n C-M-Left  resize-pane -L 5
bind -n C-M-Right resize-pane -R 5
bind -n C-M-Up    resize-pane -U 5
bind -n C-M-Down  resize-pane -D 5

# Clear screen
bind -n C-d send-keys C-l

#==============================================================================
# ⚡  Direct prefix bindings (C-a + key)
#==============================================================================

# Mnemonic tables
bind w switch-client -T window
bind p switch-client -T pane
bind s switch-client -T session

# Speed aliases (also available in their respective tables)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind x kill-pane
bind-key o display-popup -E -w 80% -h 70% "tv sesh"

# Utility
bind b send-prefix
bind d detach-client
bind r source-file ~/.tmux.conf \; display-message "🔁 Tmux config reloaded!"
bind -r T neww -c "#{pane_current_path}" "[[ -e todo.txt ]] && nvim todo.txt || nvim $HOME/Nextcloud/tasks/todo.txt"

# tv as general picker (replaces sainnhe/tmux-fzf)
bind-key Tab display-popup -E -w 80% -h 70% "tv"

#==============================================================================
# ⚡  Window table (C-a w → key)
#==============================================================================
#
#   n = new   x = kill   r = rename   f = find
#   h/l = swap left/right   a = alternate   s = select
#

bind -T window n new-window -c "#{pane_current_path}"
bind -T window x confirm-before -p "kill-window #W? (y/n)" kill-window
bind -T window r command-prompt -I "#W" { rename-window "%%" }
bind -T window h swap-window -t -1\; select-window -t -1
bind -T window l swap-window -t +1\; select-window -t +1
bind -T window f command-prompt { find-window -Z "%%" }
bind -T window a last-window
bind -T window s choose-tree -Zw

#==============================================================================
# ⚡  Pane table (C-a p → key)
#==============================================================================
#
#   |/- = split   x = kill   z = zoom
#   h/j/k/l = navigate   H/J/K/L = resize (repeatable)
#   a = alternate   m = mark   q = quick pick
#   Space = cycle layout   o = rotate   ! = break to window
#

# Split
bind -T pane | split-window -h -c "#{pane_current_path}"
bind -T pane - split-window -v -c "#{pane_current_path}"

# Manage
bind -T pane x kill-pane
bind -T pane z resize-pane -Z

# Navigate
bind -T pane h select-pane -L
bind -T pane j select-pane -D
bind -T pane k select-pane -U
bind -T pane l select-pane -R
bind -T pane a last-pane

# Resize (repeatable: C-a p H H H)
bind -r -T pane H resize-pane -L 5
bind -r -T pane J resize-pane -D 5
bind -r -T pane K resize-pane -U 5
bind -r -T pane L resize-pane -R 5

# Swap and layout
bind -T pane \{ swap-pane -U
bind -T pane \} swap-pane -D
bind -T pane ! break-pane
bind -T pane Space next-layout
bind -T pane o rotate-window

# Utility
bind -T pane m select-pane -m
bind -T pane q display-panes

#==============================================================================
# ⚡  Session table (C-a s → key)
#==============================================================================
#
#   o = open (sesh)   n = new   r = rename
#   a = alternate (last)   x = kill   d = detach   s = select
#

bind -T session o display-popup -E -w 80% -h 70% "tv sesh"
bind -T session n command-prompt -p "new session:" "new-session -s '%%'"
bind -T session r command-prompt -I "#S" { rename-session "%%" }
bind -T session a run-shell "sesh last"
bind -T session x confirm-before -p "kill-session #S? (y/n)" kill-session
bind -T session d detach-client
bind -T session s choose-tree -Zs

#==============================================================================
# ⚡  Status bar
#==============================================================================

set-option -g status-position top
set -g status-justify  left
set -g status-bg       default
set -g status-interval 2
set -g status-left-length  40
set -g status-right-length 60

#==============================================================================
# ⚡  Plugins
#==============================================================================

# christoomey/vim-tmux-navigator ----------------------------------------------
set -g @plugin 'christoomey/vim-tmux-navigator'

# laktak/extrakto -------------------------------------------------------------
set -g @plugin 'laktak/extrakto'
set-option -g @extrakto_key 'C-f'

# lost-melody/tmux-command-palette --------------------------------------------
set -g @plugin 'lost-melody/tmux-command-palette'
set -g @cmdpalette-render-cmd 'bat -l md -f -pp'

# catppuccin/tmux -------------------------------------------------------------
set -g @plugin 'catppuccin/tmux#v2.1.2'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'

set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

set -g status-left "#{E:@catppuccin_status_session} "
set -g status-right "#{E:@catppuccin_status_gitmux}"
set -ga status-right '#{?#{@qf_inbox_count}, 🔔 #{@qf_inbox_count},}'

# alberti42/tmux-fzf-links ---------------------------------------------------
set -g @plugin 'alberti42/tmux-fzf-links'
set-option -g @fzf-links-editor-open-cmd "tmux new-window -n 'nvim' nvim +%line '%file'"
set-option -g @fzf-links-browser-open-cmd "firefox '%url'"
set-option -g @fzf-links-key C-l

# MaximilianGaedig/tmux-filter ------------------------------------------------
set -g @plugin 'MaximilianGaedig/tmux-filter'

# aneveux/cheatmux ------------------------------------------------------------
set -g @plugin 'aneveux/cheatmux'

# omerxx/tmux-floax -----------------------------------------------------------
set -g @plugin 'omerxx/tmux-floax'
set -g @floax-bind 'f'

#==============================================================================
# ⚡  Plugin manager bootstrap
#==============================================================================

# tmux-plugins/tpm ------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'

# tmux-plugins/tmux-sensible --------------------------------------------------
set -g @plugin 'tmux-plugins/tmux-sensible'

if "test ! -d ~/.tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"
run '~/.tmux/plugins/tpm/tpm'

# Override gitmux module to use custom script (no gitmux binary needed)
set -g @catppuccin_gitmux_text ' #(~/.tmux/scripts/git-info.sh "#{pane_current_path}")'
